name: Postman API Docs

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "docs/v*"
    paths:
      - "backend/postman/**"
      - "backend/scripts/getPostmanDocsVersion.js"
      - "backend/scripts/validatePostmanDocs.js"
      - "backend/scripts/publishPostmanCollection.js"
      - "backend/package.json"
      - "backend/package-lock.json"
      - ".github/workflows/postman-api-docs.yml"
  pull_request:
    paths:
      - "backend/postman/**"
      - "backend/scripts/getPostmanDocsVersion.js"
      - "backend/scripts/validatePostmanDocs.js"
      - "backend/scripts/publishPostmanCollection.js"
      - "backend/package.json"
      - "backend/package-lock.json"
      - ".github/workflows/postman-api-docs.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Postman Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Postman docs
        working-directory: backend
        run: npm run docs:postman:validate

      - name: Write validation summary
        shell: bash
        run: |
          VERSION=$(node backend/scripts/getPostmanDocsVersion.js)
          {
            echo "## Postman Docs Validation"
            echo
            echo "- Version: \`$VERSION\`"
            echo "- Result: passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Postman docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-docs
          path: |
            backend/postman/Sci-Request-System.postman_collection.json
            backend/postman/Sci-Request-System.local.postman_environment.json
            backend/postman/Sci-Request-System.staging.postman_environment.json
            backend/postman/Sci-Request-System.production.postman_environment.json
            backend/postman/README.md
            backend/postman/CHANGELOG_POSTMAN_DOCS.md
            backend/postman/TEAM_ONBOARDING_POSTMAN.md
            backend/postman/RELEASE_CHECKLIST_POSTMAN_DOCS.md

  version-change:
    name: Detect Docs Version Change
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      current_version: ${{ steps.detect.outputs.current_version }}
      previous_version: ${{ steps.detect.outputs.previous_version }}
      tag_version: ${{ steps.detect.outputs.tag_version }}
      tag_matches: ${{ steps.detect.outputs.tag_matches }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect version change
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(node backend/scripts/getPostmanDocsVersion.js)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          TAG_VERSION=""
          TAG_MATCHES="true"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == docs/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#docs/}"
            echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
            if [[ "$TAG_VERSION" != "$CURRENT_VERSION" ]]; then
              TAG_MATCHES="false"
            fi
          else
            echo "tag_version=" >> "$GITHUB_OUTPUT"
          fi
          echo "tag_matches=$TAG_MATCHES" >> "$GITHUB_OUTPUT"

          PREVIOUS_REF="${{ github.event.before }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              PREVIOUS_REF=$(git rev-parse HEAD^)
            else
              PREVIOUS_REF=""
            fi
          fi

          if [[ -z "$PREVIOUS_REF" || "$PREVIOUS_REF" == "0000000000000000000000000000000000000000" ]]; then
            echo "previous_version=" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git cat-file -e "${PREVIOUS_REF}:backend/postman/Sci-Request-System.postman_collection.json" 2>/dev/null; then
            git show "${PREVIOUS_REF}:backend/postman/Sci-Request-System.postman_collection.json" > /tmp/previous-postman-collection.json
            PREVIOUS_VERSION=$(node backend/scripts/getPostmanDocsVersion.js /tmp/previous-postman-collection.json)
          else
            PREVIOUS_VERSION=""
          fi

          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write version summary
        shell: bash
        run: |
          {
            echo "## Docs Version Detection"
            echo
            echo "- Current version: \`${{ steps.detect.outputs.current_version }}\`"
            echo "- Previous version: \`${{ steps.detect.outputs.previous_version || 'none' }}\`"
            echo "- Version changed: \`${{ steps.detect.outputs.changed }}\`"
            echo "- Git ref: \`${{ github.ref }}\`"
            if [[ -n "${{ steps.detect.outputs.tag_version }}" ]]; then
              echo "- Release tag version: \`${{ steps.detect.outputs.tag_version }}\`"
              echo "- Tag matches collection version: \`${{ steps.detect.outputs.tag_matches }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish To Postman
    runs-on: ubuntu-latest
    needs:
      - validate
      - version-change
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/docs/') && needs.version-change.outputs.changed == 'true' && needs.version-change.outputs.tag_matches == 'true'
    outputs:
      can_publish: ${{ steps.check-secrets.outputs.can_publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check publish secrets
        id: check-secrets
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          if [[ -n "$POSTMAN_API_KEY" ]]; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Postman Publish"
              echo
              echo "- Skipped because \`POSTMAN_API_KEY\` is not configured"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish collection to Postman
        if: steps.check-secrets.outputs.can_publish == 'true'
        working-directory: backend
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_UID: ${{ secrets.POSTMAN_COLLECTION_UID }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        run: node scripts/publishPostmanCollection.js

      - name: Write publish summary
        if: steps.check-secrets.outputs.can_publish == 'true'
        shell: bash
        run: |
          {
            echo "## Postman Publish"
            echo
            echo "- Published because docs version changed from \`${{ needs.version-change.outputs.previous_version || 'none' }}\` to \`${{ needs.version-change.outputs.current_version }}\`"
            echo "- Release tag: \`${{ github.ref_name }}\`"
            echo "- Publish target: Postman collection"
          } >> "$GITHUB_STEP_SUMMARY"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version-change
      - publish
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/docs/') && needs.version-change.outputs.changed == 'true' && needs.version-change.outputs.tag_matches == 'true' && needs.publish.outputs.can_publish == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.version-change.outputs.current_version }}"
          CHANGELOG="backend/postman/CHANGELOG_POSTMAN_DOCS.md"

          awk -v version="$VERSION" '
            $0 == "## " version { capture=1; next }
            /^## / && capture { exit }
            capture { print }
          ' "$CHANGELOG" > /tmp/postman-release-notes.md

          if [[ ! -s /tmp/postman-release-notes.md ]]; then
            echo "ไม่พบ release notes สำหรับ $VERSION ใน CHANGELOG_POSTMAN_DOCS.md" >&2
            exit 1
          fi

          {
            echo "notes<<EOF"
            echo "Postman API Docs release ${VERSION}"
            echo
            cat /tmp/postman-release-notes.md
            echo
            echo "ไฟล์สำคัญ:"
            echo "- backend/postman/Sci-Request-System.postman_collection.json"
            echo "- backend/postman/README.md"
            echo "- backend/postman/CHANGELOG_POSTMAN_DOCS.md"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Postman API Docs ${{ needs.version-change.outputs.current_version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            backend/postman/Sci-Request-System.postman_collection.json
            backend/postman/Sci-Request-System.local.postman_environment.json
            backend/postman/Sci-Request-System.staging.postman_environment.json
            backend/postman/Sci-Request-System.production.postman_environment.json
            backend/postman/README.md
            backend/postman/CHANGELOG_POSTMAN_DOCS.md
            backend/postman/TEAM_ONBOARDING_POSTMAN.md
            backend/postman/GITHUB_SECRETS_SETUP.md
            backend/postman/RELEASE_CHECKLIST_POSTMAN_DOCS.md

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## GitHub Release"
            echo
            echo "- Created release for tag \`${{ github.ref_name }}\`"
            echo "- Notes source: \`backend/postman/CHANGELOG_POSTMAN_DOCS.md\`"
            echo "- Attached assets: collection, environments, README, changelog, onboarding, secrets guide, release checklist"
          } >> "$GITHUB_STEP_SUMMARY"
