<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Request | Ultimate Tester</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { slate: { 850: '#151e2e', 950: '#020617' } },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .code-preview { font-size: 10px; line-height: 1.4; }
        .json-key { color: #93c5fd; } .json-string { color: #86efac; } 
        .json-number { color: #fca5a5; } .json-boolean { color: #f9a8d4; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col overflow-hidden font-sans">

    <nav class="h-14 border-b border-slate-800 bg-slate-900/90 backdrop-blur flex items-center justify-between px-4 z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-bug text-sm"></i>
            </div>
            <h1 class="font-bold text-slate-100 tracking-tight text-sm">Sci-Request <span class="text-indigo-400 font-mono">CyberConsole</span></h1>
        </div>
        
        <div class="flex items-center gap-2">
            <div class="relative">
                <i class="fa-solid fa-server absolute left-2.5 top-2 text-slate-500 text-xs"></i>
                <input type="text" id="baseUrl" value="https://sci-request-system-466086429766.asia-southeast1.run.app" 
                       class="bg-slate-800 border border-slate-700 text-slate-300 text-xs rounded pl-8 pr-3 py-1.5 w-64 font-mono focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" 
                       placeholder="Target API URL">
            </div>
            <div id="auth-badge" class="px-2 py-1.5 rounded bg-slate-800 border border-slate-700 text-[10px] font-mono text-slate-400 flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div> NO AUTH
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 z-10">
            <div class="grid grid-cols-3 gap-0.5 p-1 bg-slate-850 border-b border-slate-800">
                <button onclick="setMode('functional')" class="tab-btn active text-[10px] font-bold uppercase tracking-wider py-2 rounded hover:bg-slate-800 transition text-slate-400 data-[active=true]:bg-indigo-600 data-[active=true]:text-white" data-mode="functional">Functional</button>
                <button onclick="setMode('security')" class="tab-btn text-[10px] font-bold uppercase tracking-wider py-2 rounded hover:bg-slate-800 transition text-slate-400 data-[active=true]:bg-rose-600 data-[active=true]:text-white" data-mode="security">Pentest</button>
                <button onclick="setMode('load')" class="tab-btn text-[10px] font-bold uppercase tracking-wider py-2 rounded hover:bg-slate-800 transition text-slate-400 data-[active=true]:bg-amber-600 data-[active=true]:text-white" data-mode="load">Load Test</button>
            </div>

            <div id="config-panel" class="p-3 border-b border-slate-800 bg-slate-850 hidden">
                <div class="text-[10px] font-bold text-slate-500 uppercase mb-2">Load Configuration</div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <div>
                        <label class="text-[9px] text-slate-400 block mb-1">Concurrent Users</label>
                        <input type="number" id="load-users" value="50" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-center font-mono focus:border-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-400 block mb-1">Loop Count</label>
                        <input type="number" id="load-loops" value="5" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-center font-mono focus:border-amber-500 outline-none">
                    </div>
                </div>
                <div class="text-[9px] text-amber-500/70"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Browser limited. High values may freeze UI.</div>
            </div>

            <div id="test-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1"></div>

            <div class="p-3 bg-slate-850 border-t border-slate-800">
                <div class="flex justify-between text-[10px] font-mono mb-2 px-1">
                    <span class="text-slate-400">PASSED: <b class="text-emerald-400 text-sm" id="stat-pass">0</b></span>
                    <span class="text-slate-400">FAILED: <b class="text-rose-400 text-sm" id="stat-fail">0</b></span>
                </div>
                <button onclick="runSuite()" id="action-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded text-xs font-bold uppercase tracking-wider shadow-lg shadow-indigo-900/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i> Run Functional Tests
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-950 relative overflow-hidden">
            <div class="absolute inset-0 opacity-[0.02] pointer-events-none" style="background-image: linear-gradient(#475569 1px, transparent 1px), linear-gradient(90deg, #475569 1px, transparent 1px); background-size: 20px 20px;"></div>

            <div class="h-9 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between px-4 shrink-0">
                <div class="text-[10px] font-mono text-slate-500 flex items-center gap-2">
                    <i class="fa-solid fa-terminal"></i> CONSOLE OUTPUT
                </div>
                <div class="flex gap-3">
                     <button onclick="toggleAutoScroll()" id="autoscroll-btn" class="text-[10px] text-indigo-400 hover:text-white transition"><i class="fa-solid fa-arrow-down-long"></i> Auto-Scroll: ON</button>
                    <button onclick="clearConsole()" class="text-[10px] text-slate-500 hover:text-rose-400 transition"><i class="fa-solid fa-trash-can"></i> Clear</button>
                </div>
            </div>

            <div id="console-output" class="flex-1 overflow-y-auto p-4 font-mono text-xs space-y-2 custom-scrollbar pb-10 z-10">
                <div class="h-full flex flex-col items-center justify-center text-slate-700 space-y-3 opacity-30 select-none">
                    <i class="fa-solid fa-microchip text-5xl"></i>
                    <p>System Ready. Select a mode to begin.</p>
                </div>
            </div>

            <div class="h-7 bg-indigo-600 text-white text-[10px] font-mono flex items-center justify-between px-3 shrink-0 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.3)]">
                <span id="status-msg" class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse hidden" id="status-dot"></div> IDLE</span>
                <span id="timer">00:00:00</span>
            </div>
        </main>
    </div>

    <script>
        // --- Test Definitions ---
        const suites = {
            functional: [
                { id: 'f_auth', name: 'Initialize Session', method: 'POST /session/init', icon: 'fa-key' },
                { id: 'f_dept', name: 'Get Departments', method: 'GET /departments', icon: 'fa-building' },
                { id: 'f_forms', name: 'Get Forms List', method: 'GET /forms', icon: 'fa-list-check' },
                { id: 'f_chat', name: 'Chat Valid Request', method: 'POST /chat/recommend', icon: 'fa-robot' },
                { id: 'f_up', name: 'Upload Flow', method: 'POST /upload...', icon: 'fa-cloud-arrow-up', special: 'upload_flow' },
                // ✅ เพิ่มกลับมาแล้วครับ
                { id: 'f_valid', name: 'AI Validation Check', method: 'POST /validation/check', icon: 'fa-clipboard-check', special: 'validation_flow' }
            ],
            security: [
                // Injection
                { id: 's_sql_1', name: 'SQL Injection (Basic)', desc: "' OR 1=1 --", icon: 'fa-database', type: 'injection', payload: "' OR 1=1 --" },
                { id: 's_sql_2', name: 'SQL Injection (Union)', desc: "UNION SELECT 1,2,3", icon: 'fa-database', type: 'injection', payload: "' UNION SELECT 1, null, null --" },
                { id: 's_xss_1', name: 'Reflected XSS', desc: "<script>alert(1)<\\/script>", icon: 'fa-code', type: 'injection', payload: "<script>alert('XSS')<\\/script>" },
                { id: 's_cmd_1', name: 'Command Injection', desc: "; cat /etc/passwd", icon: 'fa-terminal', type: 'injection', payload: "; cat /etc/passwd" },
                
                // Auth & Access
                { id: 's_auth_1', name: 'No Token Access', desc: 'Expect 401', icon: 'fa-lock', type: 'auth', expected: 401 },
                { id: 's_auth_2', name: 'Fake Token Access', desc: 'Expect 403', icon: 'fa-user-ninja', type: 'auth', expected: 403 },
                { id: 's_idor', name: 'IDOR / Path Traversal', desc: '../etc/passwd', icon: 'fa-folder-open', type: 'file', filename: '../../../etc/passwd' },

                // Fuzzing
                { id: 's_fuzz_1', name: 'Huge Payload (Buffer)', desc: '10KB String', icon: 'fa-weight-hanging', type: 'fuzz', size: 10000 },
                { id: 's_fuzz_2', name: 'JSON Bomb', desc: 'Nested Objects', icon: 'fa-bomb', type: 'fuzz', special: 'json_bomb' },
                { id: 's_method', name: 'Method Tampering', desc: 'DELETE /departments', icon: 'fa-ban', type: 'method', method: 'DELETE' },
                { id: 's_file', name: 'Malicious File Type', desc: '.exe Upload', icon: 'fa-file-shield', type: 'file', ext: 'exe' }
            ],
            load: [
                { id: 'l_stress', name: 'Stress Test', desc: 'High Concurrency Session Init', icon: 'fa-gauge-high' }
            ]
        };

        // --- State ---
        let state = { mode: 'functional', token: '', baseUrl: '', pass: 0, fail: 0, running: false, autoScroll: true, gcsPath: '' };
        let abortController = null;

        // --- Initialization ---
        function init() {
            setMode('functional');
            setInterval(() => document.getElementById('timer').innerText = new Date().toLocaleTimeString(), 1000);
        }

        // --- UI Logic ---
        function setMode(mode) {
            state.mode = mode;
            
            // Update Buttons
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.setAttribute('data-active', b.dataset.mode === mode);
            });

            // Config Panel
            const configPanel = document.getElementById('config-panel');
            configPanel.classList.toggle('hidden', mode !== 'load');

            // Action Button Color
            const btn = document.getElementById('action-btn');
            const colors = { functional: 'bg-indigo-600', security: 'bg-rose-600', load: 'bg-amber-600' };
            btn.className = btn.className.replace(/bg-\w+-600 hover:bg-\w+-500/, `${colors[mode]} hover:bg-opacity-80`);
            btn.innerHTML = `<i class="fa-solid fa-play"></i> Run ${mode.charAt(0).toUpperCase() + mode.slice(1)} Tests`;

            renderList();
        }

        function renderList() {
            const list = document.getElementById('test-list');
            if(state.mode === 'load') {
                list.innerHTML = `<div class="p-4 text-center text-slate-500 text-xs font-mono border border-dashed border-slate-800 rounded">
                    Load Test will execute requests based on the configuration above.<br>
                    <i class="fa-solid fa-arrow-up mt-2"></i> Check Config
                </div>`;
                return;
            }

            list.innerHTML = suites[state.mode].map(t => `
                <div id="card-${t.id}" class="group p-2.5 rounded border border-slate-800 bg-slate-900/50 hover:bg-slate-800 transition flex items-center justify-between mb-1">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-7 h-7 rounded bg-slate-800 flex items-center justify-center text-slate-500 text-xs shadow-inner group-hover:text-white transition">
                            <i class="fa-solid ${t.icon}"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="text-xs font-medium text-slate-300 truncate">${t.name}</div>
                            <div class="text-[10px] text-slate-500 font-mono truncate">${t.desc || t.method || ''}</div>
                        </div>
                    </div>
                    <div class="status-indicator w-1.5 h-1.5 rounded-full bg-slate-700 transition-all"></div>
                </div>
            `).join('');
        }

        function toggleAutoScroll() {
            state.autoScroll = !state.autoScroll;
            const btn = document.getElementById('autoscroll-btn');
            btn.innerHTML = `<i class="fa-solid fa-arrow-down-long"></i> Auto-Scroll: ${state.autoScroll ? 'ON' : 'OFF'}`;
            btn.className = state.autoScroll ? 'text-[10px] text-indigo-400 hover:text-white transition' : 'text-[10px] text-slate-600 hover:text-white transition';
        }

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
        }

        // --- Core Execution ---
        async function runSuite() {
            if(state.running) return;
            state.running = true; state.pass = 0; state.fail = 0;
            state.baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '') + '/api/v1';
            
            updateStats();
            document.getElementById('console-output').innerHTML = '';
            document.getElementById('status-dot').classList.remove('hidden');
            const btn = document.getElementById('action-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Running...';
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            log('system', `Starting ${state.mode.toUpperCase()} Suite`, { target: state.baseUrl });

            // Ensure Token for non-auth tests
            if (!state.token) await refreshAuth();

            if (state.mode === 'load') {
                await runLoadTest();
            } else {
                for (const test of suites[state.mode]) {
                    await runSingleTest(test);
                    await new Promise(r => setTimeout(r, 200)); // Pacing
                }
            }

            // Finish
            state.running = false;
            btn.innerHTML = originalText;
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
            document.getElementById('status-dot').classList.add('hidden');
            document.getElementById('status-msg').innerHTML = `<i class="fa-solid fa-check-circle"></i> DONE`;
            log('system', 'Execution Completed', { passed: state.pass, failed: state.fail });
        }

        async function refreshAuth() {
            try {
                const res = await axios.post(`${state.baseUrl}/session/init`);
                state.token = res.data.session_token;
                const badge = document.getElementById('auth-badge');
                badge.className = 'px-2 py-1.5 rounded bg-emerald-500/10 border border-emerald-500/20 text-[10px] font-mono text-emerald-400 flex items-center gap-1.5';
                badge.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> AUTHENTICATED`;
                log('info', 'Session Authenticated', { token: state.token.substring(0, 10) + '...' });
            } catch (e) {
                log('error', 'Auth Failed', e.message);
            }
        }

        // --- Single Test Logic (Func & Sec) ---
        async function runSingleTest(test) {
            const card = document.getElementById(`card-${test.id}`);
            const indicator = card.querySelector('.status-indicator');
            indicator.className = 'status-indicator w-2 h-2 rounded-full bg-amber-400 animate-pulse';

            try {
                const headers = { Authorization: `Bearer ${state.token}` };
                let response = { status: 0 };

                // >>>> Security Logic
                if (state.mode === 'security') {
                    if (test.type === 'auth') {
                        // Auth Attacks
                        const badHeader = test.expected === 401 ? {} : { Authorization: 'Bearer fake' };
                        response = await axios.get(`${state.baseUrl}/departments`, { headers: badHeader, validateStatus: () => true });
                    } 
                    else if (test.type === 'injection' || test.special === 'json_bomb') {
                        // Injection / Fuzzing
                        let body = { message: test.payload || "test", degree_level: "bachelor" };
                        if (test.special === 'json_bomb') {
                             body = { a: { b: { c: { d: "A".repeat(5000) } } } }; // Mini bomb
                        }
                        response = await axios.post(`${state.baseUrl}/chat/recommend`, body, { headers, validateStatus: () => true });
                    }
                    else if (test.type === 'method') {
                        // Method Tampering
                        response = await axios.delete(`${state.baseUrl}/departments`, { headers, validateStatus: () => true });
                    }
                    else if (test.type === 'file') {
                        // Malicious Upload
                        const fileKey = test.filename || (test.ext === 'exe' ? 'virus.exe' : 'test.pdf');
                        const fileType = test.ext === 'exe' ? 'application/x-msdownload' : 'application/pdf';
                        response = await axios.post(`${state.baseUrl}/upload/signed-url`, {
                            file_type: fileType, file_key: fileKey, file_size: 1024
                        }, { headers, validateStatus: () => true });
                    }
                    else if (test.type === 'fuzz' && test.size) {
                         // Buffer Overflow simul
                         const payload = "A".repeat(test.size);
                         response = await axios.post(`${state.baseUrl}/chat/recommend`, { message: payload }, { headers, validateStatus: () => true });
                    }
                } 
                // >>>> Functional Logic
                else {
                    if (test.id === 'f_auth') response = await axios.post(`${state.baseUrl}/session/init`);
                    else if (test.id === 'f_dept') response = await axios.get(`${state.baseUrl}/departments`, { headers });
                    else if (test.id === 'f_forms') response = await axios.get(`${state.baseUrl}/forms?degree_level=bachelor`, { headers });
                    else if (test.id === 'f_chat') response = await axios.post(`${state.baseUrl}/chat/recommend`, { message: "ลาออก", degree_level: "bachelor" }, { headers });
                    else if (test.special === 'upload_flow') {
                        // Quick Upload Test
                        const pdfContent = `%PDF-1.4\n1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << >> /Contents 4 0 R >>\nendobj\n4 0 obj\n<< /Length 24 >>\nstream\nBT /F1 24 Tf 100 700 Td (Test) Tj ET\nendstream\nendobj\nxref\n0 5\n0000000000 65535 f\n0000000010 00000 n\n0000000060 00000 n\n0000000117 00000 n\n0000000223 00000 n\ntrailer\n<< /Size 5 /Root 1 0 R >>\nstartxref\n297\n%%EOF`;
                        const blob = new Blob([pdfContent], { type: 'application/pdf' });
                        const r1 = await axios.post(`${state.baseUrl}/upload/signed-url`, { file_type: 'application/pdf', file_key: 'test', file_size: blob.size }, { headers });
                        await axios.put(r1.data.upload_url, blob, { headers: { 'Content-Type': 'application/pdf' } });
                        state.gcsPath = r1.data.gcs_path; // Store for Validation Step
                        response = { status: 200, data: { path: r1.data.gcs_path } };
                    }
                    else if (test.special === 'validation_flow') {
                        // AI Validation Step
                        if (!state.gcsPath) throw new Error("Skipped: No file uploaded yet");
                        response = await axios.post(`${state.baseUrl}/validation/check-completeness`, {
                            form_code: 'JT31', student_level: 'bachelor',
                            uploaded_files: [{ key: 'main_form', gcs_path: state.gcsPath }]
                        }, { headers });
                    }
                }

                // Check Results
                const expected = test.expected || 200;
                let passed = false;

                if (state.mode === 'security') {
                    // Security Pass = Got Expected Error OR Got 200 but handled gracefully
                    if (response.status === expected) passed = true;
                    if (test.type === 'injection' && response.status === 200) passed = true; 
                    if (test.type === 'fuzz' && response.status === 400) passed = true;
                } else {
                    // Functional Pass = 200-299
                    passed = response.status >= 200 && response.status < 300;
                }

                if (passed) {
                    indicator.className = 'status-indicator w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]';
                    state.pass++;
                    log('success', test.name, response.data || `Status: ${response.status}`);
                } else {
                    throw new Error(`Status: ${response.status}`);
                }

            } catch (err) {
                indicator.className = 'status-indicator w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.6)]';
                state.fail++;
                const msg = err.response ? `Status: ${err.response.status} - ${JSON.stringify(err.response.data)}` : err.message;
                log('error', test.name, msg);
            }
            updateStats();
        }

        // --- Load Test Logic ---
        async function runLoadTest() {
            const users = parseInt(document.getElementById('load-users').value) || 10;
            const loops = parseInt(document.getElementById('load-loops').value) || 1;
            
            log('info', `Initializing Load Test`, { concurrent_users: users, loops: loops, total_reqs: users * loops });

            for (let i = 0; i < loops; i++) {
                document.getElementById('status-msg').innerHTML = `<i class="fa-solid fa-bolt text-amber-500"></i> LOOP ${i+1}/${loops}`;
                
                const batchPromises = [];
                const start = Date.now();

                for (let u = 0; u < users; u++) {
                    // Simulate Session Init (Most common operation)
                    batchPromises.push(axios.post(`${state.baseUrl}/session/init`));
                }

                try {
                    const results = await Promise.allSettled(batchPromises);
                    const duration = Date.now() - start;
                    const success = results.filter(r => r.status === 'fulfilled').length;
                    const fail = results.filter(r => r.status === 'rejected').length;

                    state.pass += success;
                    state.fail += fail;
                    
                    const avgTime = duration / users;
                    log(fail > 0 ? 'warning' : 'success', `Loop ${i+1} Completed`, { 
                        success, fail, 
                        total_time: `${duration}ms`, 
                        avg_latency: `${avgTime.toFixed(2)}ms/req`,
                        throughput: `${(users / (duration/1000)).toFixed(1)} req/sec`
                    });

                } catch (e) {
                    log('error', 'Batch Failed', e.message);
                }

                updateStats();
                // Prevent browser freeze
                await new Promise(r => setTimeout(r, 100)); 
            }
        }

        // --- Helpers ---
        function updateStats() {
            document.getElementById('stat-pass').innerText = state.pass;
            document.getElementById('stat-fail').innerText = state.fail;
        }

        function log(type, title, data) {
            const box = document.getElementById('console-output');
            
            // Remove welcome
            if(box.querySelector('.fa-microchip')) box.innerHTML = '';

            const colors = {
                success: 'border-emerald-500/50 bg-emerald-500/5 text-emerald-200',
                error: 'border-rose-500/50 bg-rose-500/5 text-rose-200',
                warning: 'border-amber-500/50 bg-amber-500/5 text-amber-200',
                info: 'border-blue-500/50 bg-blue-500/5 text-blue-200',
                system: 'border-slate-600 bg-slate-800 text-slate-300'
            };
            const icons = {
                success: 'fa-check', error: 'fa-times', warning: 'fa-exclamation-triangle', info: 'fa-info', system: 'fa-cog'
            };

            const div = document.createElement('div');
            div.className = `p-2.5 rounded border-l-2 ${colors[type] || colors.info} mb-1.5 animate-fade-in font-mono`;
            
            let dataHtml = '';
            if (data) {
                const str = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
                dataHtml = `<pre class="mt-1.5 p-1.5 bg-slate-950/50 rounded text-[9px] overflow-x-auto custom-scrollbar code-preview">${syntaxHighlight(str)}</pre>`;
            }

            div.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="font-bold flex items-center gap-2"><i class="fa-solid ${icons[type]} opacity-70"></i> ${title}</span>
                    <span class="text-[9px] opacity-40">${new Date().toLocaleTimeString()}</span>
                </div>
                ${dataHtml}
            `;
            
            box.appendChild(div);
            if (state.autoScroll) box.scrollTop = box.scrollHeight;
        }

        function syntaxHighlight(json) {
            if (typeof json != 'string') json = JSON.stringify(json, undefined, 2);
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'text-amber-400';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                } else if (/true|false/.test(match)) cls = 'json-boolean';
                else if (/null/.test(match)) cls = 'json-number';
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        init();
    </script>
</body>
</html>
