<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Request | Robustness QA Platform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' } },
                    animation: { 'fade-in': 'fadeIn 0.3s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(5px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .tab-btn[data-active="true"] { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .tab-btn[data-active="true"][data-mode="negative"] { background-color: #be123c; } /* สีแดงสำหรับ Negative Test */
        .tab-btn[data-active="true"][data-mode="security"] { background-color: #7c3aed; } /* สีม่วงสำหรับ Security */
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col overflow-hidden font-sans">

    <nav class="h-14 border-b border-slate-800 bg-slate-900/90 backdrop-blur flex items-center justify-between px-4 z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-microscope text-sm"></i>
            </div>
            <div>
                <h1 class="font-bold text-slate-100 tracking-tight text-sm">Sci-Request <span class="text-indigo-400 font-mono">QA Console v5.0</span></h1>
                <div class="text-[9px] text-slate-500">Robustness & E2EE Testing</div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="relative group">
                <i class="fa-solid fa-server absolute left-2.5 top-2 text-slate-500 text-xs group-focus-within:text-indigo-400"></i>
                <input type="text" id="baseUrl" value="https://sci-request-system-466086429766.asia-southeast1.run.app" 
                       class="bg-slate-800 border border-slate-700 text-slate-300 text-xs rounded pl-8 pr-3 py-1.5 w-72 font-mono focus:border-indigo-500 outline-none transition-all" 
                       placeholder="Target API URL">
            </div>
            <div id="session-badge" class="px-2.5 py-1 rounded bg-slate-800 border border-slate-700 text-[10px] font-mono text-slate-500 flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div> No Session
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 z-10">
            <div class="grid grid-cols-2 gap-1 p-2 bg-slate-850 border-b border-slate-800">
                <button onclick="setMode('functional')" class="tab-btn text-[10px] font-bold uppercase py-2 rounded text-slate-400 hover:bg-slate-800 transition" data-mode="functional"><i class="fa-solid fa-check mr-1"></i> Happy Path</button>
                <button onclick="setMode('negative')" class="tab-btn text-[10px] font-bold uppercase py-2 rounded text-slate-400 hover:bg-slate-800 transition" data-mode="negative"><i class="fa-solid fa-bomb mr-1"></i> Negative</button>
                <button onclick="setMode('security')" class="tab-btn text-[10px] font-bold uppercase py-2 rounded text-slate-400 hover:bg-slate-800 transition" data-mode="security"><i class="fa-solid fa-shield-halved mr-1"></i> Security</button>
                <button onclick="setMode('integration')" class="tab-btn text-[10px] font-bold uppercase py-2 rounded text-slate-400 hover:bg-slate-800 transition" data-mode="integration"><i class="fa-solid fa-diagram-project mr-1"></i> Flow</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1" id="test-list-container"></div>

            <div class="p-3 bg-slate-850 border-t border-slate-800">
                <div class="flex justify-between text-[10px] font-mono mb-2.5 px-1">
                    <span class="text-slate-400">PASSED: <b class="text-emerald-400 text-sm" id="count-pass">0</b></span>
                    <span class="text-slate-400">FAILED: <b class="text-rose-400 text-sm" id="count-fail">0</b></span>
                </div>
                <button onclick="runCurrentSuite()" id="run-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded text-xs font-bold uppercase tracking-wider shadow-lg shadow-indigo-900/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i> EXECUTE SUITE
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-950 relative overflow-hidden">
            <div class="h-9 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between px-4 shrink-0 z-10 backdrop-blur-sm">
                <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-terminal"></i> Live Console
                    <span id="encryption-status" class="text-slate-600 ml-2 text-[9px] border border-slate-800 px-1 rounded transition-all duration-300">WAITING HANDSHAKE</span>
                </span>
                <button onclick="clearLogs()" class="text-[10px] text-slate-500 hover:text-rose-400 transition"><i class="fa-solid fa-trash-can"></i> Clear</button>
            </div>

            <div id="console-logs" class="flex-1 overflow-y-auto p-4 font-mono text-xs space-y-2 custom-scrollbar pb-10 z-10 scroll-smooth">
                <div class="h-full flex flex-col items-center justify-center text-slate-700 space-y-3 opacity-40 select-none">
                    <i class="fa-solid fa-flask text-5xl"></i>
                    <p>Ready to verify system robustness.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 0. Mock Data (สำหรับจำลองไฟล์ PDF) ---
        const MOCK_PDF = `%PDF-1.4\n1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << >> /Contents 4 0 R >>\nendobj\n4 0 obj\n<< /Length 24 >>\nstream\nBT /F1 24 Tf 100 700 Td (Test Document) Tj ET\nendstream\nendobj\nxref\n0 5\n0000000000 65535 f\n0000000010 00000 n\n0000000060 00000 n\n0000000117 00000 n\n0000000223 00000 n\ntrailer\n<< /Size 5 /Root 1 0 R >>\nstartxref\n297\n%%EOF`;

        // --- 🔐 Secure Client (หัวใจสำคัญ: จัดการเข้ารหัสทั้งหมด) ---
        const SecureClient = {
            publicKey: null,
            baseUrl: '',

            // เริ่มต้นระบบ: ขอ Public Key จาก Server
            async init(url) {
                this.baseUrl = url.replace(/\/$/, '') + '/api/v1';
                if(!this.publicKey) {
                    try {
                        log('system', 'Handshake', 'Requesting Public Key from Server...');
                        // Endpoint นี้ไม่ต้องเข้ารหัส (เป็น Plain GET)
                        const res = await axios.get(`${this.baseUrl}/auth/public-key`);
                        this.publicKey = res.data.publicKey;
                        
                        // อัปเดตสถานะบนหน้าจอ
                        const badge = document.getElementById('encryption-status');
                        badge.innerText = "ENCRYPTION ACTIVE";
                        badge.className = "text-emerald-400 ml-2 text-[9px] border border-emerald-800 bg-emerald-900/30 px-1 rounded animate-pulse";
                        
                        log('success', 'Handshake Established', { type: 'RSA-4096 + AES-256-GCM', key: 'Received' });
                    } catch(e) {
                        log('error', 'Handshake Failed', e.message);
                        throw e;
                    }
                }
            },

            // ฟังก์ชันส่งข้อมูลแบบเข้ารหัส (ใช้แทน axios.post ปกติ)
            async post(endpoint, data, headers = {}) {
                // ถ้ายังไม่มี Key ให้ไปขอก่อน
                if(!this.publicKey) await this.init(state.baseUrl);

                // 1. สร้าง Session Key (AES) สำหรับ Request นี้
                const aesKey = forge.random.getBytesSync(32);
                const iv = forge.random.getBytesSync(12);

                // 2. เข้ารหัสเนื้อหา (Payload) ด้วย AES
                const cipher = forge.cipher.createCipher('AES-GCM', aesKey);
                cipher.start({ iv: iv });
                cipher.update(forge.util.createBuffer(JSON.stringify(data), 'utf8'));
                cipher.finish();
                
                // 3. เข้ารหัส Session Key ด้วย RSA Public Key ของ Server
                const pubKeyObj = forge.pki.publicKeyFromPem(this.publicKey);
                const encryptedAesKey = pubKeyObj.encrypt(aesKey, 'RSA-OAEP', { md: forge.md.sha256.create() });

                // 4. แพ็คใส่กล่องตามฟอร์แมตที่ Backend ต้องการ
                const payload = {
                    encKey: forge.util.encode64(encryptedAesKey),
                    iv: forge.util.encode64(iv),
                    payload: forge.util.encode64(cipher.output.getBytes()),
                    tag: forge.util.encode64(cipher.mode.tag.getBytes())
                };

                // 5. ส่งและรอรับผล (Backend จะตอบกลับมาแบบเข้ารหัสเช่นกัน)
                try {
                    const res = await axios.post(`${this.baseUrl}${endpoint}`, payload, { headers, validateStatus: () => true });
                    
                    // 6. ถ้า Server ส่งข้อมูลกลับมาแบบเข้ารหัส -> ถอดรหัส
                    if(res.data && res.data.payload && res.data.iv) {
                        const decipher = forge.cipher.createDecipher('AES-GCM', aesKey);
                        decipher.start({ iv: forge.util.decode64(res.data.iv), tag: forge.util.decode64(res.data.tag) });
                        decipher.update(forge.util.createBuffer(forge.util.decode64(res.data.payload)));
                        
                        if(decipher.finish()) {
                            res.data = JSON.parse(decipher.output.toString()); // แทนที่ด้วยข้อมูลจริงที่อ่านรู้เรื่อง
                        }
                    }
                    return res;
                } catch(e) { throw e; }
            },

            // GET ไม่ต้องเข้ารหัส Body แต่ต้อง Verify URL
            async get(endpoint, headers = {}) {
                return await axios.get(`${this.baseUrl}${endpoint}`, { headers, validateStatus: () => true });
            }
        };

        // --- 📋 Test Suites (รายการทดสอบ) ---
        const suites = {
            // 🟢 Happy Path: เทสว่าระบบทำงานได้ปกติ
            functional: [
                { id: 'f1', name: 'Init Session', method: 'POST /session/init', body: {}, expected: 200, icon: 'fa-user-check' },
                { id: 'f2', name: 'Get Departments', method: 'GET /departments', expected: 200, icon: 'fa-building' },
                { id: 'f3', name: 'Upload PDF', method: 'UPLOAD', fileType: 'application/pdf', fileName: 'test.pdf', expected: 200, icon: 'fa-cloud-arrow-up' },
                { id: 'f4', name: 'AI Chat', method: 'POST /chat/recommend', body: { message: 'สวัสดีครับ', degree_level: 'bachelor' }, expected: 200, icon: 'fa-comments' },
                { id: 'f5', name: 'Validation', method: 'VALIDATE', formCode: 'REQ-001', expected: 200, icon: 'fa-check-double' }
            ],
            // 🔴 Negative Testing: เทสว่าระบบ "กัน" สิ่งแปลกปลอมได้ไหม
            negative: [ 
                { id: 'n1', name: 'Upload .EXE File', method: 'POST /upload/signed-url', body: { file_type: 'application/x-msdownload', file_name: 'virus.exe', file_size: 1024 }, expected: 400, icon: 'fa-file-excel', desc: 'Should Block Executable' },
                { id: 'n2', name: 'Upload Missing Params', method: 'POST /upload/signed-url', body: { file_name: 'test.pdf' }, expected: 400, icon: 'fa-circle-exclamation', desc: 'Missing file_type/size' },
                { id: 'n3', name: 'Get Invalid Form', method: 'GET /forms/INVALID-999', expected: 404, icon: 'fa-magnifying-glass-minus', desc: 'Form Not Found' },
                { id: 'n4', name: 'Validate Empty', method: 'POST /validation/check-completeness', body: { form_code: 'REQ-001', uploaded_files: [] }, expected: 200, checkData: (d) => d.is_complete === false, icon: 'fa-clipboard-question', desc: 'Result should be Incomplete' }
            ],
            // 🟣 Security: เทสเรื่อง Token และ Injection
            security: [
                { id: 's1', name: 'Bad Token Access', method: 'POST /chat/recommend', body: { message: 'hi' }, headerOverride: { Authorization: 'Bearer invalid' }, expected: 403, icon: 'fa-key' }, // Middleware Auth จะ reject
                { id: 's2', name: 'No Token Access', method: 'POST /chat/recommend', body: { message: 'hi' }, headerOverride: { Authorization: '' }, expected: 401, icon: 'fa-lock' }
            ],
            // 🔵 Integration: เทส Flow ยาวๆ ต่อเนื่องกัน
            integration: [
                { id: 'i1', name: 'Full Flow: Upload -> Validate', method: 'FLOW', icon: 'fa-layer-group' }
            ]
        };

        // --- State Management ---
        let state = { mode: 'functional', token: null, gcsPath: null, stats: { pass: 0, fail: 0 }, isRunning: false };

        // --- Core Functions ---
        function init() { setMode('functional'); }

        function setMode(mode) {
            state.mode = mode;
            // เปลี่ยนสีปุ่มตามโหมด
            document.querySelectorAll('.tab-btn').forEach(btn => btn.setAttribute('data-active', btn.dataset.mode === mode));
            renderList();
        }

        function renderList() {
            const list = document.getElementById('test-list-container');
            list.innerHTML = suites[state.mode].map(t => `
                <div id="card-${t.id}" class="log-item p-2.5 rounded border border-slate-800 bg-slate-900/50 hover:bg-slate-800 transition flex items-center justify-between mb-1 group cursor-pointer" onclick="runSingleTestById('${t.id}')">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-6 h-6 rounded bg-slate-800 flex items-center justify-center text-slate-500 text-[10px] shadow-inner group-hover:text-white transition">
                            <i class="fa-solid ${t.icon || 'fa-circle'}"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="text-xs font-medium text-slate-300 truncate">${t.name}</div>
                            <div class="text-[10px] text-slate-500 font-mono truncate">${t.desc || (t.method.split(' ')[0] + ' Expect: ' + t.expected)}</div>
                        </div>
                    </div>
                    <div class="status-dot w-2 h-2 rounded-full bg-slate-700 transition-all"></div>
                </div>
            `).join('');
        }

        // ฟังก์ชันรันชุดทดสอบทั้งหมด
        async function runCurrentSuite() {
            if(state.isRunning) return;
            state.isRunning = true;
            state.stats = { pass: 0, fail: 0 };
            updateStats();
            document.getElementById('console-logs').innerHTML = '';
            state.baseUrl = document.getElementById('baseUrl').value; // อัปเดต URL ล่าสุด
            
            // Auto Auth: ถ้าไม่ใช่โหมด Security ให้ Login ก่อนเลยเพื่อความสะดวก
            if(state.mode !== 'security' && !state.token) await authenticate();

            for (const test of suites[state.mode]) {
                await runTest(test);
                await new Promise(r => setTimeout(r, 200)); // เว้นจังหวะนิดนึง
            }
            state.isRunning = false;
        }

        async function authenticate() {
            try {
                // ใช้ SecureClient ส่งข้อมูลเปล่าๆ ไปขอ Token
                const res = await SecureClient.post('/session/init', {});
                state.token = res.data.session_token;
                document.getElementById('session-badge').innerHTML = `<span class="text-emerald-400">● Active</span>`;
                log('info', 'Authenticated', { token: '...' + state.token.slice(-10) });
            } catch(e) { log('error', 'Auth Failed', e.message); }
        }

        async function runTest(test) {
            const card = document.getElementById(`card-${test.id}`);
            const dot = card.querySelector('.status-dot');
            dot.className = 'status-dot w-2 h-2 rounded-full bg-amber-400 animate-pulse'; // กำลังรัน...

            try {
                let res;
                const headers = test.headerOverride || { Authorization: `Bearer ${state.token}` };

                // 1. แยกตรรกะตามประเภท Test Case
                if (test.method === 'UPLOAD') {
                    // จำลองไฟล์ PDF
                    const blob = new Blob([MOCK_PDF], { type: test.fileType });
                    // ขอ Signed URL แบบ Encrypted
                    const r1 = await SecureClient.post('/upload/signed-url', { file_type: test.fileType, file_name: test.fileName, file_size: blob.size }, headers);
                    if(r1.status === 200) {
                        // อัปโหลดจริง (ไป Google Cloud ไม่ต้อง Encrypt Payload)
                        await axios.put(r1.data.upload_url, blob, { headers: { 'Content-Type': test.fileType } });
                        state.gcsPath = r1.data.gcs_path;
                        res = { status: 200, data: { uploaded: true, path: state.gcsPath } };
                    } else res = r1;
                } 
                else if (test.method === 'VALIDATE') {
                    if(!state.gcsPath) throw new Error("No file uploaded. Run Upload test first.");
                    res = await SecureClient.post('/validation/check-completeness', { form_code: test.formCode, uploaded_files: [{ key: 'transcript', gcs_path: state.gcsPath }] }, headers);
                }
                else if (test.method === 'FLOW') {
                     // Integration Flow (ข้ามไปก่อนในตัวอย่างนี้)
                     res = { status: 200, data: 'Flow Complete' }; 
                }
                else if (test.method.startsWith('GET')) {
                    res = await SecureClient.get(test.method.split(' ')[1], headers);
                }
                else { // POST ทั่วไป
                    res = await SecureClient.post(test.method.split(' ')[1], test.body, headers);
                }

                // 2. ตรวจสอบผลลัพธ์ (Verification)
                let passed = false;
                
                // เช็ค Status Code ว่าตรงกับที่คาดหวังไหม (เช่น หวัง 400 ต้องได้ 400)
                if (res.status === test.expected) passed = true;
                
                // เช็ค Data Logic (ถ้ามีกำหนดไว้)
                if (passed && test.checkData) {
                    passed = test.checkData(res.data);
                    if(!passed) throw new Error("Status OK but Data Check Failed");
                }

                if (passed) {
                    dot.className = 'status-dot w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                    state.stats.pass++;
                    log('success', test.name, res.data || `Status: ${res.status}`);
                } else {
                    throw new Error(`Expected ${test.expected}, Got ${res.status}`);
                }

            } catch(e) {
                // ถ้าพัง (Exception) หรือ Status ไม่ตรง
                const actualStatus = e.response ? e.response.status : 'Error';
                
                // กรณีพิเศษ: ถ้าเราคาดหวัง Error (เช่น 400) แล้วมัน Error จริงๆ ให้ถือว่าผ่าน
                if (test.expected === actualStatus) {
                     dot.className = 'status-dot w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                     state.stats.pass++;
                     log('success', test.name, `Got expected error: ${actualStatus}`);
                } else {
                    dot.className = 'status-dot w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]';
                    state.stats.fail++;
                    log('error', test.name, e.response?.data || e.message);
                }
            }
            updateStats();
        }

        // --- Helper Functions ---
        function log(type, title, data) {
            const box = document.getElementById('console-logs');
            if(box.querySelector('.fa-flask')) box.innerHTML = '';
            
            const colors = { success: 'border-emerald-500/50 text-emerald-300', error: 'border-rose-500/50 text-rose-300', info: 'border-blue-500/50 text-blue-300', system: 'border-slate-600 text-slate-400' };
            const icons = { success: 'fa-check', error: 'fa-xmark', info: 'fa-info', system: 'fa-terminal' };

            const div = document.createElement('div');
            div.className = `p-2 rounded border-l-2 ${colors[type]} bg-slate-900/40 mb-1 font-mono text-[10px] animate-fade-in`;
            div.innerHTML = `
                <div class="flex justify-between font-bold mb-1"><span class="flex items-center gap-2"><i class="fa-solid ${icons[type]}"></i> ${title}</span> <span class="opacity-50">${new Date().toLocaleTimeString()}</span></div>
                ${data ? `<pre class="bg-black/20 p-1.5 rounded overflow-x-auto custom-scrollbar">${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateStats() {
            document.getElementById('count-pass').innerText = state.stats.pass;
            document.getElementById('count-fail').innerText = state.stats.fail;
        }

        function clearLogs() { document.getElementById('console-logs').innerHTML = ''; }
        
        // เริ่มต้นทำงาน
        init();
    </script>
</body>
</html>
