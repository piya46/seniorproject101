<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Request | QA & Prototype Lab</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { 
                        slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' },
                        primary: { 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' }
                    },
                    animation: { 'fade-in': 'fadeIn 0.3s ease-out', 'slide-up': 'slideUp 0.3s ease-out' },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .prose p { margin-bottom: 0.5em; }
        .prose ul { list-style-type: disc; padding-left: 1.2em; margin-bottom: 0.5em; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col overflow-hidden font-sans selection:bg-indigo-500/30">

    <nav class="h-16 border-b border-slate-800 bg-slate-900/80 backdrop-blur flex items-center justify-between px-6 z-30 shrink-0 shadow-md">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-flask text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-slate-100 text-lg tracking-tight">Sci-Request <span class="text-indigo-400 font-mono text-xs ml-2 bg-indigo-950/50 px-2 py-0.5 rounded border border-indigo-500/20">PROTOTYPE</span></h1>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative group">
                <i class="fa-solid fa-server absolute left-3 top-2.5 text-slate-500 text-xs transition-colors group-focus-within:text-indigo-400"></i>
                <input type="text" id="baseUrl" value="https://sci-request-system-466086429766.asia-southeast1.run.app" 
                       class="bg-slate-900 border border-slate-700 text-slate-300 text-xs rounded-lg pl-9 pr-3 py-2 w-64 font-mono focus:border-indigo-500 outline-none transition-all shadow-sm">
            </div>
            <button onclick="authenticate()" id="session-btn" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 hover:bg-slate-700 transition text-xs font-medium text-slate-300">
                <div id="session-dot" class="w-2 h-2 rounded-full bg-slate-500"></div>
                <span id="session-text">Connect Session</span>
            </button>
        </div>
    </nav>

    <div class="flex-1 overflow-hidden relative">
        <div id="view-lab" class="absolute inset-0 flex transition-opacity duration-300 z-10 bg-slate-950">
            
            <div class="w-7/12 border-r border-slate-800 flex flex-col p-6 overflow-y-auto custom-scrollbar">
                
                <div class="glass rounded-xl p-5 mb-8 shadow-lg">
                    <h2 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-file-contract text-indigo-400"></i> Step 1: Form Selection
                    </h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] text-slate-500 uppercase mb-1 font-bold">Form Type</label>
                            <select id="lab-form-code" onchange="fetchFormDetails()" class="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-indigo-500">
                                <option value="JT35" selected>JT35 - ทักท้วงผลการเรียน</option>
                                <option value="JT44">JT44 - ลาป่วย</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 uppercase mb-1 font-bold">Degree Level</label>
                            <select id="lab-degree" onchange="fetchFormDetails()" class="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-indigo-500">
                                <option value="bachelor">Bachelor (ป.ตรี)</option>
                                <option value="graduate">Graduate (บัณฑิตศึกษา)</option>
                            </select>
                        </div>
                    </div>
                    <div id="lab-form-info" class="mt-4 text-xs text-slate-400 bg-slate-850/50 rounded-lg p-4 border border-slate-800 hidden animate-fade-in">
                        <p class="mb-2"><strong class="text-indigo-400">📍 Location:</strong> <span id="info-location">...</span></p>
                        <div><strong class="text-indigo-400">📝 Steps:</strong> <ul id="info-steps" class="list-disc ml-4 mt-1"></ul></div>
                    </div>
                </div>

                <div class="glass rounded-xl p-5 mb-6 flex-1 shadow-lg relative">
                    <h2 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up text-emerald-400"></i> Step 2: Upload & Validate
                    </h2>
                    <div class="mb-4">
                        <label class="text-[10px] text-slate-500 uppercase mb-1 block font-bold">Document Type</label>
                        <select id="lab-file-key" class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-xs rounded-lg p-2.5 outline-none focus:border-indigo-500">
                            <option value="main_form">Main Form (แบบฟอร์มหลัก)</option>
                            <option value="med_cert">Medical Certificate (ใบรับรองแพทย์)</option>
                            <option value="payment_slip">Payment Slip (หลักฐานการโอนเงิน)</option>
                        </select>
                    </div>

                    <div id="drop-zone" class="border-2 border-dashed border-slate-700 rounded-xl h-40 flex flex-col items-center justify-center text-slate-500 hover:border-indigo-500 hover:bg-indigo-500/5 transition-all cursor-pointer relative bg-slate-900/30">
                        <input type="file" id="lab-file-input" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                        <i class="fa-solid fa-file-pdf text-2xl mb-2"></i>
                        <p class="text-xs">Click to upload or drag & drop</p>
                        <div id="file-name-display" class="hidden absolute bottom-4 px-3 py-1 bg-indigo-500/20 rounded-full border border-indigo-500/50 text-indigo-300 text-[10px] animate-fade-in">
                             <i class="fa-solid fa-check mr-1"></i> <span id="file-name-text">filename.pdf</span>
                        </div>
                    </div>

                    <button onclick="labUploadAndCheck()" id="btn-lab-check" class="w-full mt-6 bg-slate-800 text-slate-500 font-bold py-3 rounded-lg text-xs transition-all border border-slate-700 cursor-not-allowed" disabled>
                        Select File First
                    </button>
                    
                    <div id="lab-result" class="mt-6 hidden animate-slide-up">
                        <div id="lab-result-content" class="rounded-lg bg-slate-900 border border-slate-800 overflow-hidden shadow-inner"></div>
                    </div>
                </div>
            </div>

            <div class="w-5/12 flex flex-col bg-slate-900/30 border-l border-slate-800">
                <div class="p-4 border-b border-slate-800 bg-slate-900/80 backdrop-blur flex justify-between items-center shadow-sm z-10">
                    <h2 class="text-sm font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-robot text-indigo-400"></i> AI Assistant
                    </h2>
                </div>
                <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-slate-950/50">
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-lg"><i class="fa-solid fa-robot text-xs"></i></div>
                        <div class="bg-slate-800 p-3.5 rounded-2xl rounded-tl-none text-sm text-slate-300 max-w-[90%] border border-slate-700 shadow-sm">
                            สวัสดีครับ 👋 ผมคือ AI ผู้ช่วย มีอะไรให้ช่วยสอบถามได้เลยครับ
                        </div>
                    </div>
                </div>
                <div class="p-4 bg-slate-900 border-t border-slate-800">
                    <div class="relative group">
                        <input type="text" id="chat-input" placeholder="Type your message..." class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-4 pr-12 py-3.5 text-sm text-white focus:border-indigo-500 outline-none" onkeypress="if(event.key === 'Enter') sendChatMessage()">
                        <button onclick="sendChatMessage()" class="absolute right-2 top-2.5 w-9 h-9 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg flex items-center justify-center transition shadow-lg active:scale-95">
                            <i class="fa-solid fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Shared State ---
        let state = {
            baseUrl: document.getElementById('baseUrl').value,
            lab: { selectedFile: null }
        };

        // --- 🍪 Cookie Helpers ---
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // --- 🔐 Secure Client ---
        const SecureClient = {
            publicKey: null,
            async init() {
                const url = document.getElementById('baseUrl').value;
                state.baseUrl = url.replace(/\/$/, '') + '/api/v1';
                // ✅ สำคัญ: เปิดใช้งาน credentials สำหรับระบบหลัก
                axios.defaults.withCredentials = true;

                if(!this.publicKey) {
                    try {
                        const res = await axios.get(`${state.baseUrl}/auth/public-key`);
                        this.publicKey = res.data.publicKey;
                    } catch(e) { console.error('Handshake error', e); alert("Connection Failed."); }
                }
            },
            async post(endpoint, data, headers = {}) {
                if(!this.publicKey) await this.init();
                const aesKey = forge.random.getBytesSync(32);
                const iv = forge.random.getBytesSync(12);
                const cipher = forge.cipher.createCipher('AES-GCM', aesKey);
                cipher.start({ iv: iv });
                cipher.update(forge.util.createBuffer(JSON.stringify(data), 'utf8'));
                cipher.finish();
                const pubKeyObj = forge.pki.publicKeyFromPem(this.publicKey);
                const encryptedAesKey = pubKeyObj.encrypt(aesKey, 'RSA-OAEP', { md: forge.md.sha256.create() });
                
                const payload = {
                    encKey: forge.util.encode64(encryptedAesKey),
                    iv: forge.util.encode64(iv),
                    payload: forge.util.encode64(cipher.output.getBytes()),
                    tag: forge.util.encode64(cipher.mode.tag.getBytes())
                };

                const res = await axios.post(`${state.baseUrl}${endpoint}`, payload, { headers, validateStatus: () => true });
                if(res.data && res.data.payload) {
                    const decipher = forge.cipher.createDecipher('AES-GCM', aesKey);
                    decipher.start({ iv: forge.util.decode64(res.data.iv), tag: forge.util.decode64(res.data.tag) });
                    decipher.update(forge.util.createBuffer(forge.util.decode64(res.data.payload)));
                    if(decipher.finish()) res.data = JSON.parse(decipher.output.toString());
                }
                return res;
            },
            async get(endpoint) {
                if(!state.baseUrl) await this.init();
                return await axios.get(`${state.baseUrl}${endpoint}`, { validateStatus: () => true });
            }
        };

        // --- 🌐 Global Functions ---
        async function authenticate() {
            const btn = document.getElementById('session-btn');
            const dot = document.getElementById('session-dot');
            const text = document.getElementById('session-text');
            text.innerText = "Connecting...";
            try {
                const res = await SecureClient.post('/session/init', {});
                if (res.status === 200) {
                    setCookie('sci_session_token', 'active', 1);
                    dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]";
                    text.innerText = "Session Active";
                    btn.classList.add('border-emerald-500/50', 'bg-emerald-500/10', 'text-emerald-400');
                }
            } catch (e) {
                text.innerText = "Auth Failed";
                dot.className = "w-2 h-2 rounded-full bg-rose-500";
            }
        }

        async function fetchFormDetails() {
            if(!getCookie('sci_session_token')) await authenticate();
            const formCode = document.getElementById('lab-form-code').value;
            const degree = document.getElementById('lab-degree').value;
            try {
                const res = await SecureClient.get(`/forms/${formCode}?degree_level=${degree}`);
                document.getElementById('lab-form-info').classList.remove('hidden');
                document.getElementById('info-location').innerText = res.data.submission_location || '-';
                document.getElementById('info-steps').innerHTML = (res.data.submission_steps || []).map(s => `<li>${s}</li>`).join('');
            } catch(e) { console.error(e); }
        }

        // --- 🔬 Upload & Validate Logic ---
        document.getElementById('lab-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                state.lab.selectedFile = file;
                document.getElementById('file-name-text').innerText = file.name;
                document.getElementById('file-name-display').classList.remove('hidden');
                const btn = document.getElementById('btn-lab-check');
                btn.disabled = false;
                btn.className = "w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-lg text-xs transition-all shadow-lg active:scale-[0.98]";
                btn.innerText = "Upload & Validate";
            }
        });

        async function labUploadAndCheck() {
            if(!getCookie('sci_session_token')) await authenticate();
            const file = state.lab.selectedFile;
            const fileKey = document.getElementById('lab-file-key').value;
            const formCode = document.getElementById('lab-form-code').value;
            const btn = document.getElementById('btn-lab-check');

            btn.innerText = "Processing...";
            btn.disabled = true;
            
            try {
                // Step A: Get Signed URL
                const r1 = await SecureClient.post('/upload/signed-url', {
                    file_name: file.name, file_type: file.type || 'application/pdf',
                    file_size: file.size, file_key: fileKey
                });

                if(r1.status !== 200) throw new Error('Signed URL failed');

                // ✅ Step B: Upload to GCS (FIXED: Set withCredentials to false)
                console.log('Uploading to GCS...');
                await axios.put(r1.data.upload_url, file, { 
                    headers: { 'Content-Type': file.type },
                    withCredentials: false // 👈 สำคัญ: ห้ามส่ง Cookie ไป GCS เพราะจะติด CORS
                });
                
                // Step C: Validate
                const r2 = await SecureClient.post('/validation/check-completeness', {
                    form_code: formCode,
                    uploaded_files: [{ key: fileKey, gcs_path: r1.data.gcs_path }]
                });

                // Display Result
                const resultBox = document.getElementById('lab-result');
                const resultContent = document.getElementById('lab-result-content');
                resultBox.classList.remove('hidden');
                
                const rawData = r2.data;
                let status = 'UNKNOWN', reason = 'No reason provided';
                if (rawData[fileKey]) {
                    status = rawData[fileKey].status; reason = rawData[fileKey].reason;
                }

                const isPass = status.toLowerCase().includes('valid');
                const color = isPass ? 'emerald' : 'rose';

                resultContent.innerHTML = `
                    <div class="flex items-stretch">
                        <div class="w-1.5 bg-${color}-500"></div>
                        <div class="p-4 flex-1 bg-${color}-500/10 border-${color}-500/30">
                            <div class="flex items-center gap-2 mb-2">
                                <i class="fa-solid ${isPass ? 'fa-circle-check text-emerald-400' : 'fa-circle-xmark text-rose-400'}"></i>
                                <span class="font-bold text-sm uppercase text-${color}-400">${status}</span>
                            </div>
                            <div class="text-slate-300 text-xs leading-relaxed prose prose-invert prose-xs">
                                ${marked.parse(reason)}
                            </div>
                        </div>
                    </div>
                `;
                btn.innerText = "Check Another File";
                btn.disabled = false;

            } catch(e) {
                alert("Error: " + (e.response?.data?.error || e.message));
                btn.innerText = "Retry Upload";
                btn.disabled = false;
            }
        }

        async function sendChatMessage() {
            if(!getCookie('sci_session_token')) await authenticate();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if(!message) return;

            const container = document.getElementById('chat-history');
            container.insertAdjacentHTML('beforeend', `<div class="flex gap-3 flex-row-reverse animate-slide-up"><div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white shrink-0 shadow-sm"><i class="fa-solid fa-user text-xs"></i></div><div class="p-3.5 rounded-2xl bg-slate-800 text-white rounded-tr-none text-sm max-w-[85%] shadow-sm">${message}</div></div>`);
            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                const degree = document.getElementById('lab-degree').value;
                const res = await SecureClient.post('/chat/recommend', { message, degree_level: degree });
                let botText = res.data.reply || res.data.text || JSON.stringify(res.data);
                
                container.insertAdjacentHTML('beforeend', `<div class="flex gap-3 animate-slide-up"><div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-lg"><i class="fa-solid fa-robot text-xs"></i></div><div class="p-3.5 rounded-2xl bg-slate-800 text-slate-300 border border-slate-700 rounded-tl-none text-sm max-w-[85%] prose prose-invert prose-xs">${marked.parse(botText)}</div></div>`);
                container.scrollTop = container.scrollHeight;
            } catch(e) { console.error(e); }
        }

        // Init
        SecureClient.init();
        fetchFormDetails();
    </script>
</body>
</html>
