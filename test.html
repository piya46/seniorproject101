<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Request API Tester (Cloud Run)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .log-entry { border-left: 4px solid; }
        .log-success { border-color: #10B981; background-color: #ECFDF5; }
        .log-error { border-color: #EF4444; background-color: #FEF2F2; }
        .log-info { border-color: #3B82F6; background-color: #EFF6FF; }
        .log-warning { border-color: #F59E0B; background-color: #FFFBEB; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 flex flex-col">

    <header class="bg-white shadow-sm border-b sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="bg-green-600 text-white p-2.5 rounded-lg shadow-sm">
                    <i class="fa-solid fa-cloud text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-900 leading-tight">Sci-Request API Tester</h1>
                    <p class="text-xs text-gray-500">Target: Cloud Run (Production)</p>
                </div>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <div class="relative flex-1 sm:flex-none">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-server"></i>
                    </span>
                    <input type="text" id="baseUrl" value="https://sci-request-system-466086429766.asia-southeast1.run.app" class="border border-gray-300 rounded-lg pl-9 pr-3 py-2 text-sm w-full sm:w-96 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition shadow-sm font-mono text-xs" placeholder="https://your-api.run.app">
                </div>
                <button onclick="runAllTests()" id="runBtn" class="bg-green-600 hover:bg-green-700 active:bg-green-800 text-white px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-play"></i> <span class="hidden sm:inline">รันทดสอบ</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-4">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[500px] lg:h-auto">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                    <h2 class="font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-green-600"></i> รายการทดสอบ
                    </h2>
                    <span id="progress-text" class="bg-gray-200 text-gray-600 px-2 py-0.5 rounded text-xs font-mono font-bold">0/8</span>
                </div>
                <div class="overflow-y-auto flex-1 divide-y divide-gray-100" id="test-list">
                    </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-database"></i> Session State
                </h3>
                <div class="space-y-3">
                    <div class="bg-gray-50 p-2.5 rounded border border-gray-100">
                        <div class="text-[10px] text-gray-400 uppercase mb-1">Session Token (JWT)</div>
                        <div id="display-token" class="text-xs font-mono text-green-600 break-all line-clamp-2" title="No Token Yet">-</div>
                    </div>
                    <div class="bg-gray-50 p-2.5 rounded border border-gray-100">
                        <div class="text-[10px] text-gray-400 uppercase mb-1">Session ID (Folder Name)</div>
                        <div id="display-session" class="text-xs font-mono text-blue-600 font-bold">-</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col h-[600px] lg:h-[calc(100vh-140px)]">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-full overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                    <h2 class="font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-gray-500"></i> Logs & Response Data
                    </h2>
                    <div class="flex gap-2">
                         <button onclick="copyLogs()" class="text-gray-500 hover:text-gray-700 hover:bg-gray-200 p-1.5 rounded transition" title="Copy Logs">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button onclick="clearLogs()" class="text-gray-500 hover:text-red-600 hover:bg-red-50 p-1.5 rounded transition" title="Clear Logs">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
                <div id="console-output" class="flex-1 overflow-y-auto p-4 space-y-3 font-mono text-sm bg-[#fafafa]">
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-4">
                        <i class="fa-solid fa-rocket text-4xl opacity-20"></i>
                        <p>พร้อมทดสอบระบบ Cloud Run<br>กดปุ่ม <span class="font-bold text-gray-500">"รันทดสอบ"</span> ด้านบนเพื่อเริ่ม</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let state = {
            token: null,
            sessionId: null,
            baseUrl: '', // Will be set from input
            uploadedFileKey: null,
            uploadedGcsPath: null,
            isRunning: false
        };

        const testCases = [
            { id: 'auth', name: '1. Init Session', desc: 'POST /session/init (ขอ Token)', fn: testInitSession },
            { id: 'meta', name: '2. Get Departments', desc: 'GET /departments (รายชื่อภาควิชา)', fn: testGetDepartments },
            { id: 'forms', name: '3. Get All Forms', desc: 'GET /forms (รายชื่อฟอร์มทั้งหมด)', fn: testGetForms },
            { id: 'form_detail', name: '4. Get Form Config (JT31)', desc: 'GET /forms/JT31 (ดูเงื่อนไขฟอร์ม)', fn: testGetFormConfig },
            { id: 'chat', name: '5. Chat Recommendation', desc: 'POST /chat/recommend (AI แนะนำ)', fn: testChatRecommend },
            { id: 'upload_url', name: '6. Get Upload URL', desc: 'POST /upload/signed-url (ขอลิ้งค์อัพโหลด)', fn: testGetUploadUrl },
            { id: 'validation', name: '7. AI Validation', desc: 'POST /validation/check (ตรวจสอบเอกสาร)', fn: testValidation },
            { id: 'merge', name: '8. Merge Documents', desc: 'POST /documents/merge (รวมไฟล์ PDF)', fn: testMergeDocs }
        ];

        // Initialization
        function initUI() {
            const list = document.getElementById('test-list');
            list.innerHTML = testCases.map(t => `
                <div id="test-row-${t.id}" class="px-4 py-3 flex items-center justify-between hover:bg-gray-50 transition group">
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="font-medium text-sm text-gray-800 truncate" title="${t.name}">${t.name}</div>
                        <div class="text-[11px] text-gray-400 group-hover:text-gray-500 truncate">${t.desc}</div>
                    </div>
                    <div class="status-icon text-gray-300 w-6 h-6 flex items-center justify-center">
                        <i class="fa-regular fa-circle"></i>
                    </div>
                </div>
            `).join('');
        }
        initUI();

        // Logging System
        function log(type, title, data) {
            const container = document.getElementById('console-output');
            
            // Remove welcome message if exists
            if (container.querySelector('.fa-rocket')) {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            const colorClass = type === 'success' ? 'log-success text-green-900' 
                           : type === 'error' ? 'log-error text-red-900' 
                           : type === 'warning' ? 'log-warning text-amber-800'
                           : 'log-info text-blue-900';
            
            div.className = `log-entry p-3 rounded text-xs shadow-sm bg-white ${colorClass} mb-2 transition-all duration-300 ease-in-out transform translate-y-1 opacity-0`;
            
            let content = `
                <div class="flex justify-between items-start mb-1.5">
                    <span class="font-bold flex items-center gap-2">
                        ${type === 'success' ? '<i class="fa-solid fa-check text-green-500"></i>' : 
                          type === 'error' ? '<i class="fa-solid fa-triangle-exclamation text-red-500"></i>' : 
                          type === 'warning' ? '<i class="fa-solid fa-triangle-exclamation text-amber-500"></i>' : 
                          '<i class="fa-solid fa-info-circle text-blue-500"></i>'}
                        ${title}
                    </span>
                    <span class="opacity-40 text-[10px] font-mono">${new Date().toLocaleTimeString()}</span>
                </div>
            `;
            
            if (data) {
                if (typeof data === 'object') {
                    content += `<div class="bg-white/50 p-2 rounded border border-black/5 overflow-x-auto mt-1">
                        <pre class="text-[10px] leading-relaxed text-gray-600">${JSON.stringify(data, null, 2)}</pre>
                    </div>`;
                } else {
                    content += `<div class="text-gray-700 mt-1 pl-6 border-l-2 border-gray-300">${data}</div>`;
                }
            }

            div.innerHTML = content;
            container.appendChild(div);
            
            requestAnimationFrame(() => {
                div.classList.remove('translate-y-1', 'opacity-0');
            });
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function updateStatus(id, status) {
            const row = document.getElementById(`test-row-${id}`);
            const icon = row.querySelector('.status-icon');
            row.classList.remove('bg-blue-50', 'bg-green-50', 'bg-red-50', 'bg-amber-50');
            
            if (status === 'running') {
                row.classList.add('bg-blue-50');
                icon.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-blue-500"></i>';
            } else if (status === 'success') {
                row.classList.add('bg-green-50');
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-lg"></i>';
            } else if (status === 'error') {
                row.classList.add('bg-red-50');
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-lg"></i>';
            } else if (status === 'warning') {
                row.classList.add('bg-amber-50');
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-amber-500 text-lg"></i>';
            } else {
                icon.innerHTML = '<i class="fa-regular fa-circle text-gray-300"></i>';
            }
        }

        function clearLogs() {
            const container = document.getElementById('console-output');
            container.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-4">
                    <i class="fa-solid fa-rocket text-4xl opacity-20"></i>
                    <p>พร้อมทดสอบระบบ Cloud Run<br>กดปุ่ม <span class="font-bold text-gray-500">"รันทดสอบ"</span> ด้านบนเพื่อเริ่ม</p>
                </div>
            `;
            document.getElementById('progress-text').innerText = '0/8';
            document.getElementById('progress-text').className = 'bg-gray-200 text-gray-600 px-2 py-0.5 rounded text-xs font-mono font-bold';
            testCases.forEach(t => updateStatus(t.id, 'idle'));
            document.getElementById('display-token').innerText = '-';
            document.getElementById('display-session').innerText = '-';
            state.token = null;
        }

        function copyLogs() {
            const text = document.getElementById('console-output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied logs to clipboard!');
            });
        }

        // --- Core Test Logic ---

        async function runAllTests() {
            if (state.isRunning) return;
            state.isRunning = true;
            
            const btn = document.getElementById('runBtn');
            const originalBtnContent = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังทำงาน...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            clearLogs(); 
            const baseUrlInput = document.getElementById('baseUrl').value.replace(/\/$/, '');
            state.baseUrl = `${baseUrlInput}/api/v1`;
            
            log('info', '🚀 Starting Test Suite', `Target: ${state.baseUrl}`);

            let passedCount = 0;
            const progressEl = document.getElementById('progress-text');

            for (const test of testCases) {
                updateStatus(test.id, 'running');
                document.getElementById(`test-row-${test.id}`).scrollIntoView({ behavior: 'smooth', block: 'center' });

                try {
                    await test.fn();
                    updateStatus(test.id, 'success');
                    passedCount++;
                } catch (error) {
                    console.error(error);
                    
                    let errorMsg = error.message;
                    let errorData = null;
                    let isPermError = false;

                    if (error.response) {
                        errorMsg = `Status ${error.response.status}`;
                        errorData = error.response.data;
                        if(error.response.status === 500) isPermError = true;
                    } else if (error.request) {
                         errorMsg = "Network Error (CORS/SSL)";
                    }

                    // Treat Permission errors as Warnings (so the suite continues but alerts user)
                    if (isPermError && (test.id === 'chat' || test.id === 'upload_url' || test.id === 'validation' || test.id === 'merge')) {
                         updateStatus(test.id, 'warning');
                         log('warning', `⚠️ Cloud Permission Issue: ${test.name}`, errorData);
                         log('info', 'Suggestion', 'Check Cloud Run IAM Roles (Vertex AI User / Storage Object Admin)');
                         
                         // Mock data to let next tests proceed if possible
                         if (test.id === 'upload_url') state.uploadedGcsPath = `${state.sessionId}/mock_file.pdf`;
                    } else {
                        updateStatus(test.id, 'error');
                        log('error', `❌ Test Failed: ${test.name}`, errorData || errorMsg);
                        
                        if (test.id === 'auth') {
                            log('error', '🛑 Critical Failure', 'Authentication failed. Stopping sequence.');
                            break;
                        }
                    }
                }
                
                progressEl.innerText = `${passedCount}/${testCases.length}`;
                await new Promise(r => setTimeout(r, 800));
            }

            log('info', '🏁 Test Suite Completed', `Passed: ${passedCount}/${testCases.length}`);
            
            state.isRunning = false;
            btn.innerHTML = originalBtnContent;
            btn.disabled = false;
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
        }

        // --- Test Functions ---

        function getHeaders() {
            return { headers: { Authorization: `Bearer ${state.token}` } };
        }

        async function testInitSession() {
            log('info', '1. Initializing Session...', 'POST /session/init');
            const res = await axios.post(`${state.baseUrl}/session/init`);
            if (!res.data.session_token) throw new Error("No token returned");
            state.token = res.data.session_token;
            state.sessionId = res.data.session_id;
            document.getElementById('display-token').innerText = state.token;
            document.getElementById('display-session').innerText = state.sessionId;
            log('success', 'Session Created', { session_id: state.sessionId });
        }

        async function testGetDepartments() {
            log('info', '2. Fetching Departments...', 'GET /departments');
            const res = await axios.get(`${state.baseUrl}/departments`, getHeaders());
            log('success', 'Departments Fetched', `Found ${res.data.data.length} departments`);
        }

        async function testGetForms() {
            log('info', '3. Fetching Forms List...', 'GET /forms?degree_level=bachelor');
            const res = await axios.get(`${state.baseUrl}/forms?degree_level=bachelor`, getHeaders());
            log('success', 'Forms Fetched', `Found ${res.data.data.length} forms available`);
        }

        async function testGetFormConfig() {
            const formCode = 'JT31';
            log('info', `4. Fetching Config for ${formCode}...`, `GET /forms/${formCode}`);
            const res = await axios.get(`${state.baseUrl}/forms/${formCode}?degree_level=bachelor`, getHeaders());
            state.uploadedFileKey = res.data.required_documents[0].key;
            log('success', 'Form Config Loaded', { title: res.data.form_name });
        }

        async function testChatRecommend() {
            const payload = { message: "อยากลาออกต้องทำยังไงครับ", degree_level: "bachelor" };
            log('info', '5. Testing AI Chat...', payload);
            const res = await axios.post(`${state.baseUrl}/chat/recommend`, payload, getHeaders());
            log('success', 'AI Response Received', res.data.data);
        }

        // ✅ Updated Logic: Upload Dummy File after getting URL
        async function testGetUploadUrl() {
            const payload = { file_type: "application/pdf", file_key: state.uploadedFileKey || "main_form", file_size: 1024 };
            log('info', '6. Requesting Upload URL...', payload);
            
            // 1. Get Signed URL
            const res = await axios.post(`${state.baseUrl}/upload/signed-url`, payload, getHeaders());
            state.uploadedGcsPath = res.data.gcs_path;
            const uploadUrl = res.data.upload_url; 
            
            log('success', 'Signed URL Generated', { gcs_path: res.data.gcs_path });

            // 2. Upload Dummy File to Storage
            log('info', '6.1 Uploading Dummy File...', 'PUT to Signed URL');
            
            // Create a minimal PDF structure (Blob)
            // Note: This needs to be a valid enough PDF/file content for your system.
            const dummyPdfContent = "%PDF-1.4\n1 0 obj\n<<\n/Type /Catalog\n/Pages 2 0 R\n>>\nendobj\n2 0 obj\n<<\n/Type /Pages\n/Kids [3 0 R]\n/Count 1\n>>\nendobj\n3 0 obj\n<<\n/Type /Page\n/Parent 2 0 R\n/MediaBox [0 0 612 792]\n/Resources <<\n/Font <<\n/F1 <<\n/Type /Font\n/Subtype /Type1\n/BaseFont /Helvetica\n>>\n>>\n>>\n/Contents 4 0 R\n>>\nendobj\n4 0 obj\n<<\n/Length 21\n>>\nstream\nBT\n/F1 24 Tf\n100 700 Td\n(Hello World) Tj\nET\nendstream\nendobj\nxref\n0 5\n0000000000 65535 f\n0000000010 00000 n\n0000000060 00000 n\n0000000117 00000 n\n0000000282 00000 n\ntrailer\n<<\n/Size 5\n/Root 1 0 R\n>>\nstartxref\n353\n%%EOF";
            const dummyBlob = new Blob([dummyPdfContent], { type: 'application/pdf' });
            
            try {
                // IMPORTANT: Headers must match what was signed in backend
                await axios.put(uploadUrl, dummyBlob, {
                    headers: { 'Content-Type': 'application/pdf' }
                });
                log('success', 'Upload Complete', 'Dummy file uploaded successfully');
            } catch (err) {
                console.error("Upload Error:", err);
                throw new Error("Failed to upload file to Storage");
            }
        }

        async function testValidation() {
            const payload = { form_code: "JT31", student_level: "bachelor", uploaded_files: [{ key: "main_form", gcs_path: state.uploadedGcsPath || "mock/path.pdf" }] };
            log('info', '7. Validating Documents...', payload);
            const res = await axios.post(`${state.baseUrl}/validation/check-completeness`, payload, getHeaders());
            log('success', 'Validation Completed', res.data);
        }

        async function testMergeDocs() {
            const payload = { form_code: "JT31", department_id: "math_ug", gcs_paths: [state.uploadedGcsPath || "mock/path.pdf"] };
            log('info', '8. Merging Documents...', payload);
            const res = await axios.post(`${state.baseUrl}/documents/merge`, payload, getHeaders());
            log('success', 'Merge Process Initiated', res.data);
        }
    </script>
</body>
</html>
