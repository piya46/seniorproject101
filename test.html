<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Request | QA Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { 
                        slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' },
                        primary: { 500: '#6366f1', 600: '#4f46e5' }
                    },
                    animation: { 'fade-in': 'fadeIn 0.2s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(2px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { bg: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Tab Styles */
        .tab-btn { position: relative; overflow: hidden; }
        .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 2px; background: #6366f1; transition: width 0.3s; }
        .tab-btn[data-active="true"] { color: #818cf8; background: rgba(99, 102, 241, 0.1); }
        .tab-btn[data-active="true"]::after { width: 100%; }

        /* JSON Details */
        details > summary { list-style: none; cursor: pointer; transition: color 0.2s; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] > summary { color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 4px; margin-bottom: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col overflow-hidden font-sans selection:bg-indigo-500/30">

    <nav class="h-14 border-b border-slate-800 bg-slate-900/80 backdrop-blur flex items-center justify-between px-4 z-20 shrink-0 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-indigo-500/20 shadow-lg">
                <i class="fa-solid fa-flask text-sm"></i>
            </div>
            <div>
                <h1 class="font-bold text-slate-100 tracking-tight text-sm">Sci-Request <span class="text-indigo-400 font-mono text-xs ml-1 bg-indigo-950/50 px-1.5 py-0.5 rounded border border-indigo-500/20">QA v5.1</span></h1>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="relative group">
                <i class="fa-solid fa-globe absolute left-3 top-2.5 text-slate-500 text-xs transition-colors group-focus-within:text-indigo-400"></i>
                <input type="text" id="baseUrl" value="https://sci-request-system-466086429766.asia-southeast1.run.app" 
                       class="bg-slate-900 border border-slate-700 text-slate-300 text-xs rounded-md pl-9 pr-3 py-1.5 w-80 font-mono focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 outline-none transition-all placeholder:text-slate-600" 
                       placeholder="API Endpoint URL">
            </div>
            
            <div id="session-badge" class="px-3 py-1.5 rounded-md bg-slate-900 border border-slate-700 text-[11px] font-mono text-slate-400 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-slate-600 ring-2 ring-slate-800"></div> Guest
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 z-10 shadow-xl">
            
            <div class="p-4 border-b border-slate-800 bg-slate-850/50">
                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-3">Test Parameters</div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-slate-400 mb-1 block">Form Code</label>
                        <input type="text" id="config-form" value="JT35" class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:border-indigo-500 outline-none font-mono text-center uppercase" placeholder="e.g. JT35">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 mb-1 block">Level</label>
                        <select id="config-level" class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:border-indigo-500 outline-none">
                            <option value="bachelor">Bachelor</option>
                            <option value="master">Master</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex border-b border-slate-800 bg-slate-900">
                <button onclick="setMode('functional')" class="tab-btn flex-1 py-3 text-[10px] font-bold text-slate-400 hover:text-slate-200 transition" data-mode="functional">FUNCTIONAL</button>
                <button onclick="setMode('negative')" class="tab-btn flex-1 py-3 text-[10px] font-bold text-slate-400 hover:text-slate-200 transition" data-mode="negative">NEGATIVE</button>
                <button onclick="setMode('security')" class="tab-btn flex-1 py-3 text-[10px] font-bold text-slate-400 hover:text-slate-200 transition" data-mode="security">SECURITY</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1" id="test-list-container">
                </div>

            <div class="p-4 bg-slate-900 border-t border-slate-800">
                <div class="flex justify-between items-end mb-3">
                    <div class="text-[10px] text-slate-500">Summary</div>
                    <div class="flex gap-3 text-xs font-mono font-bold">
                        <span class="text-emerald-400"><i class="fa-solid fa-check mr-1"></i><span id="count-pass">0</span></span>
                        <span class="text-rose-400"><i class="fa-solid fa-xmark mr-1"></i><span id="count-fail">0</span></span>
                    </div>
                </div>
                <button onclick="runCurrentSuite()" id="run-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg text-xs font-bold shadow-lg shadow-indigo-900/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 border border-indigo-500">
                    <i class="fa-solid fa-play"></i> RUN ALL TESTS
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-950 relative overflow-hidden">
            <div class="h-10 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between px-4 shrink-0 z-10 backdrop-blur-sm">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-terminal"></i> Console Output
                    </span>
                    <span id="encryption-status" class="hidden text-[9px] border border-emerald-800 bg-emerald-950/50 text-emerald-400 px-2 py-0.5 rounded-full flex items-center gap-1.5 transition-all">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> E2EE Active
                    </span>
                </div>
                <button onclick="clearLogs()" class="text-[10px] text-slate-500 hover:text-slate-300 transition flex items-center gap-1.5 px-2 py-1 hover:bg-slate-800 rounded">
                    <i class="fa-solid fa-trash-can"></i> Clear
                </button>
            </div>

            <div id="console-logs" class="flex-1 overflow-y-auto p-4 font-mono text-xs space-y-2 custom-scrollbar pb-10 z-0 scroll-smooth">
                <div class="h-full flex flex-col items-center justify-center text-slate-800 space-y-4 select-none">
                    <div class="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center border border-slate-800">
                        <i class="fa-solid fa-code-branch text-2xl text-slate-700"></i>
                    </div>
                    <p class="text-slate-600 font-medium">Select a test suite or click "Run All"</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 0. Mock Data (PDF) ---
        const MOCK_PDF = `%PDF-1.4\n1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << >> /Contents 4 0 R >>\nendobj\n4 0 obj\n<< /Length 24 >>\nstream\nBT /F1 24 Tf 100 700 Td (QA Test Document) Tj ET\nendstream\nendobj\nxref\n0 5\n0000000000 65535 f\n0000000010 00000 n\n0000000060 00000 n\n0000000117 00000 n\n0000000223 00000 n\ntrailer\n<< /Size 5 /Root 1 0 R >>\nstartxref\n297\n%%EOF`;

        // --- 🔐 Secure Client (Encryption Core) ---
        const SecureClient = {
            publicKey: null,
            baseUrl: '',

            async init(url) {
                this.baseUrl = url.replace(/\/$/, '') + '/api/v1';
                if(!this.publicKey) {
                    try {
                        log('system', 'Handshake', 'Requesting RSA Public Key...');
                        const res = await axios.get(`${this.baseUrl}/auth/public-key`);
                        this.publicKey = res.data.publicKey;
                        
                        document.getElementById('encryption-status').classList.remove('hidden');
                        log('success', 'Handshake Established', { key_type: 'RSA-4096' });
                    } catch(e) {
                        log('error', 'Handshake Failed', e.message);
                        throw e;
                    }
                }
            },

            async post(endpoint, data, headers = {}) {
                if(!this.publicKey) await this.init(state.baseUrl);
                
                // 1. Generate AES Session Key
                const aesKey = forge.random.getBytesSync(32);
                const iv = forge.random.getBytesSync(12);

                // 2. Encrypt Payload (AES-GCM)
                const cipher = forge.cipher.createCipher('AES-GCM', aesKey);
                cipher.start({ iv: iv });
                cipher.update(forge.util.createBuffer(JSON.stringify(data), 'utf8'));
                cipher.finish();
                
                // 3. Encrypt AES Key (RSA-OAEP)
                const pubKeyObj = forge.pki.publicKeyFromPem(this.publicKey);
                const encryptedAesKey = pubKeyObj.encrypt(aesKey, 'RSA-OAEP', { md: forge.md.sha256.create() });

                // 4. Wrap Payload
                const payload = {
                    encKey: forge.util.encode64(encryptedAesKey),
                    iv: forge.util.encode64(iv),
                    payload: forge.util.encode64(cipher.output.getBytes()),
                    tag: forge.util.encode64(cipher.mode.tag.getBytes())
                };

                // 5. Send Request
                try {
                    const res = await axios.post(`${this.baseUrl}${endpoint}`, payload, { headers, validateStatus: () => true });
                    
                    // 6. Decrypt Response if Encrypted
                    if(res.data && res.data.payload && res.data.iv) {
                        try {
                            const decipher = forge.cipher.createDecipher('AES-GCM', aesKey);
                            decipher.start({ iv: forge.util.decode64(res.data.iv), tag: forge.util.decode64(res.data.tag) });
                            decipher.update(forge.util.createBuffer(forge.util.decode64(res.data.payload)));
                            if(decipher.finish()) {
                                res.data = JSON.parse(decipher.output.toString());
                            }
                        } catch(err) {
                            console.error('Decryption error', err);
                        }
                    }
                    return res;
                } catch(e) { throw e; }
            },

            async get(endpoint, headers = {}) {
                return await axios.get(`${this.baseUrl}${endpoint}`, { headers, validateStatus: () => true });
            }
        };

        // --- 📋 Test Configuration ---
        const getParams = () => ({
            formCode: document.getElementById('config-form').value || 'JT35',
            degree: document.getElementById('config-level').value || 'bachelor'
        });

        const suites = {
            functional: [
                { id: 'f1', name: 'Init Session', method: 'POST /session/init', body: {}, expected: 200, icon: 'fa-user-check' },
                { id: 'f2', name: 'Get Departments', method: 'GET /departments', expected: 200, icon: 'fa-building' },
                { id: 'f3', name: 'Upload PDF', method: 'UPLOAD', fileType: 'application/pdf', fileName: 'test.pdf', fileKey: 'main_form', expected: 200, icon: 'fa-cloud-arrow-up' },
                { id: 'f4', name: 'AI Chat', method: 'POST /chat/recommend', dynamicBody: () => ({ message: 'ขอแบบฟอร์มลาออก', degree_level: getParams().degree }), expected: 200, icon: 'fa-comments' },
                { id: 'f5', name: 'Validation', method: 'VALIDATE', dynamicParams: () => ({ formCode: getParams().formCode }), expected: 200, icon: 'fa-check-double' }
            ],
            negative: [ 
                { id: 'n1', name: 'Block EXE File', method: 'POST /upload/signed-url', body: { file_type: 'application/x-msdownload', file_name: 'malware.exe', file_size: 1024, file_key: 'main_form' }, expected: 400, icon: 'fa-shield-virus', desc: 'Should reject executable' },
                { id: 'n2', name: 'Missing Params', method: 'POST /upload/signed-url', body: { file_name: 'test.pdf' }, expected: 400, icon: 'fa-circle-exclamation' },
                { id: 'n3', name: 'Invalid Form', method: 'GET /forms/INVALID-99', expected: 404, icon: 'fa-magnifying-glass-minus' },
                { id: 'n4', name: 'Validate Empty', method: 'POST /validation/check-completeness', dynamicBody: () => ({ form_code: getParams().formCode, uploaded_files: [] }), expected: 400, icon: 'fa-clipboard-question', desc: 'Should fail if no files' }
            ],
            security: [
                { id: 's1', name: 'Invalid Token', method: 'POST /chat/recommend', body: { message: 'hi' }, headerOverride: { Authorization: 'Bearer fake-token' }, expected: 403, icon: 'fa-key' },
                { id: 's2', name: 'No Token', method: 'POST /chat/recommend', body: { message: 'hi' }, headerOverride: { Authorization: '' }, expected: 401, icon: 'fa-lock' }
            ]
        };

        // --- State ---
        let state = { mode: 'functional', token: null, gcsPath: null, stats: { pass: 0, fail: 0 }, isRunning: false };

        // --- Core ---
        function init() { setMode('functional'); }

        function setMode(mode) {
            state.mode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.setAttribute('data-active', btn.dataset.mode === mode));
            renderList();
        }

        function renderList() {
            const list = document.getElementById('test-list-container');
            list.innerHTML = suites[state.mode].map(t => `
                <div id="card-${t.id}" onclick="runSingleTestById('${t.id}')" 
                     class="group p-3 rounded-lg border border-slate-800 bg-slate-800/30 hover:bg-slate-800 hover:border-slate-700 transition cursor-pointer mb-2 relative overflow-hidden">
                    <div class="flex items-center gap-3 relative z-10">
                        <div class="w-8 h-8 rounded-md bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-500 text-xs shadow-sm group-hover:text-indigo-400 group-hover:border-indigo-500/30 transition-colors">
                            <i class="fa-solid ${t.icon}"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-xs font-semibold text-slate-200 truncate group-hover:text-white">${t.name}</div>
                            <div class="text-[10px] text-slate-500 font-mono truncate">${t.desc || (t.method.split(' ')[0] + ' Expect: ' + t.expected)}</div>
                        </div>
                        <div class="status-dot w-2 h-2 rounded-full bg-slate-700 transition-all"></div>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-transparent to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                </div>
            `).join('');
        }

        async function runCurrentSuite() {
            if(state.isRunning) return;
            state.isRunning = true;
            state.stats = { pass: 0, fail: 0 };
            updateStats();
            document.getElementById('console-logs').innerHTML = '';
            
            state.baseUrl = document.getElementById('baseUrl').value;
            
            // Auto Login if needed
            if(state.mode !== 'security' && !state.token) await authenticate();

            for (const test of suites[state.mode]) {
                await runTest(test);
                await new Promise(r => setTimeout(r, 100));
            }
            state.isRunning = false;
        }

        async function runSingleTestById(id) {
            if(state.isRunning) return;
            state.baseUrl = document.getElementById('baseUrl').value;
            if(state.mode !== 'security' && !state.token) await authenticate();
            
            const test = suites[state.mode].find(t => t.id === id);
            if(test) await runTest(test);
        }

        async function authenticate() {
            try {
                log('system', 'Auto-Authenticating...', 'Getting new session token');
                const res = await SecureClient.post('/session/init', {});
                state.token = res.data.session_token;
                document.getElementById('session-badge').innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> Authenticated`;
                document.getElementById('session-badge').classList.add('text-emerald-400', 'bg-emerald-950/20', 'border-emerald-900');
                log('success', 'Session Created', { token: state.token.substring(0, 15) + '...' });
            } catch(e) { 
                log('error', 'Auth Failed', e.message); 
            }
        }

        async function runTest(test) {
            const card = document.getElementById(`card-${test.id}`);
            const dot = card.querySelector('.status-dot');
            dot.className = 'status-dot w-2 h-2 rounded-full bg-amber-400 animate-pulse shadow-[0_0_8px_rgba(251,191,36,0.5)]';
            
            try {
                let res;
                const headers = test.headerOverride || { Authorization: `Bearer ${state.token}` };
                
                // Dynamic Data Binding
                const body = test.dynamicBody ? test.dynamicBody() : (test.body || {});
                const params = test.dynamicParams ? test.dynamicParams() : {};

                if (test.method === 'UPLOAD') {
                    const blob = new Blob([MOCK_PDF], { type: test.fileType });
                    const r1 = await SecureClient.post('/upload/signed-url', { 
                        file_type: test.fileType, file_name: test.fileName, file_size: blob.size, file_key: test.fileKey 
                    }, headers);
                    
                    if(r1.status === 200) {
                        await axios.put(r1.data.upload_url, blob, { headers: { 'Content-Type': test.fileType } });
                        state.gcsPath = r1.data.gcs_path;
                        res = { status: 200, data: { uploaded: true, key: r1.data.file_key, path: state.gcsPath } };
                    } else res = r1;
                } 
                else if (test.method === 'VALIDATE') {
                    if(!state.gcsPath) throw new Error("Skipped: No file uploaded yet");
                    res = await SecureClient.post('/validation/check-completeness', { 
                        form_code: params.formCode, uploaded_files: [{ key: 'main_form', gcs_path: state.gcsPath }] 
                    }, headers);
                }
                else if (test.method.startsWith('GET')) {
                    res = await SecureClient.get(test.method.split(' ')[1], headers);
                }
                else {
                    res = await SecureClient.post(test.method.split(' ')[1], body, headers);
                }

                const actualStatus = res.status;
                const passed = actualStatus === test.expected;

                if (passed) {
                    dot.className = 'status-dot w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                    state.stats.pass++;
                    log('success', test.name, res.data || `Status: ${actualStatus}`);
                } else {
                    dot.className = 'status-dot w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]';
                    state.stats.fail++;
                    log('error', test.name, res.data || `Expected ${test.expected}, Got ${actualStatus}`);
                }

            } catch(e) {
                const actualStatus = e.response ? e.response.status : 'ERR';
                if (test.expected === actualStatus) {
                     dot.className = 'status-dot w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                     state.stats.pass++;
                     log('success', test.name, `Got expected error: ${actualStatus}`);
                } else {
                    dot.className = 'status-dot w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]';
                    state.stats.fail++;
                    log('error', test.name, e.response?.data || e.message);
                }
            }
            updateStats();
        }

        // --- UI Helpers ---
        function log(type, title, data) {
            const box = document.getElementById('console-logs');
            if(box.querySelector('.fa-flask') || box.querySelector('.fa-code-branch')) box.innerHTML = '';

            const styles = {
                success: { border: 'border-emerald-500/50', icon: 'text-emerald-400 fa-circle-check', bg: 'bg-emerald-950/10' },
                error: { border: 'border-rose-500/50', icon: 'text-rose-400 fa-circle-xmark', bg: 'bg-rose-950/10' },
                info: { border: 'border-blue-500/50', icon: 'text-blue-400 fa-circle-info', bg: 'bg-blue-950/10' },
                system: { border: 'border-slate-600', icon: 'text-slate-400 fa-terminal', bg: 'bg-slate-900/50' }
            };
            const style = styles[type] || styles.system;

            // Collapsible Log Item
            const html = `
                <details class="group rounded border-l-2 ${style.border} ${style.bg} overflow-hidden animate-fade-in transition-all open:bg-opacity-50">
                    <summary class="flex items-center justify-between p-2 select-none hover:bg-white/5">
                        <div class="flex items-center gap-2.5">
                            <i class="fa-solid ${style.icon} text-xs"></i>
                            <span class="text-xs font-semibold text-slate-200">${title}</span>
                        </div>
                        <span class="text-[10px] font-mono text-slate-500">${new Date().toLocaleTimeString()}</span>
                    </summary>
                    <div class="p-2 pt-0 border-t border-white/5 mt-1">
                        <pre class="text-[10px] text-slate-400 font-mono overflow-x-auto custom-scrollbar p-1">${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}</pre>
                    </div>
                </details>
            `;
            
            const div = document.createElement('div');
            div.innerHTML = html;
            box.appendChild(div.firstElementChild);
            box.scrollTop = box.scrollHeight;
        }

        function updateStats() {
            document.getElementById('count-pass').innerText = state.stats.pass;
            document.getElementById('count-fail').innerText = state.stats.fail;
        }

        function clearLogs() { 
            document.getElementById('console-logs').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-800 space-y-4 select-none">
                    <div class="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center border border-slate-800">
                        <i class="fa-solid fa-code-branch text-2xl text-slate-700"></i>
                    </div>
                    <p class="text-slate-600 font-medium">Logs cleared</p>
                </div>
            `; 
        }

        init();
    </script>
</body>
</html>
